services:
    cron:
        restart: always
        image: olegmilantiev/yc-php:${PROJECT_VERSION}
        command: crond -f -l 2 -c /etc/crontabs
        env_file:
            - .env
        depends_on:
            - redis
            - postgres
        volumes:
            - uploads:/var/www/yc/public/uploads
            - ./crontabs:/etc/crontabs/root # alpine

    nginx:
        restart: always
        image: olegmilantiev/yc-nginx:${PROJECT_VERSION}
        ports:
            - 280:80
        depends_on:
            - php
        volumes:
            - uploads:/var/www/yc/public/uploads:ro
            - ./maintenance:/var/www/yc/public/maintenance:ro

    php:
        restart: always
        image: olegmilantiev/yc-php:${PROJECT_VERSION}
        env_file:
            - .env
        depends_on:
            mercure:
                condition: service_healthy
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        expose:
            - 9000
        volumes:
            # todo chown -R 82:82 public/uploads/
            - uploads:/var/www/yc/public/uploads

    ffmpeg:
        restart: always
        image: olegmilantiev/yc-ffmpeg:${PROJECT_VERSION}
        env_file:
            - .env
        depends_on:
            mercure:
                condition: service_healthy
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        # todo --memory-limit MEMORY-LIMIT
        command: sh -c '/var/www/yc/bin/console messenger:consume async -v --no-ansi --limit=30'
        mem_limit: 256m
        deploy:
            replicas: 1
            resources:
                limits:
                    memory: 256M
        volumes:
            - uploads:/var/www/yc/public/uploads

    ffmpeg-transcode:
        restart: always
        image: olegmilantiev/yc-ffmpeg:${PROJECT_VERSION}
        env_file:
            - .env
        depends_on:
            mercure:
                condition: service_healthy
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        # todo --memory-limit MEMORY-LIMIT (fill after logs fill and check)
        command: sh -c '/var/www/yc/bin/console messenger:consume async_transcode -v --no-ansi --limit=10'
        mem_limit: 512m
        deploy:
            replicas: 2
            # todo up memory limit. Ex.: 4k use 2g+ :(
            resources:
                limits:
                    memory: 512M
        volumes:
            - uploads:/var/www/yc/public/uploads

    redis:
        restart: always
        image: redis:7
        expose:
            - 6379
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

    postgres:
        restart: always
        image: docker.io/postgres:16.2
        shm_size: 1g
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U yc"]
            interval: 5s
            timeout: 5s
            retries: 5
        expose:
            - 5432
        environment:
            - POSTGRES_USER=yc
            - POSTGRES_PASSWORD=yc
        volumes:
            - ./postgresql:/host
            - db-data:/var/lib/postgresql/data

    playwright:
        image: mcr.microsoft.com/playwright:v1.53.0-jammy
        depends_on:
            - nginx
        working_dir: /work/e2e
        command: ["bash", "-lc", "sleep infinity"]
        extra_hosts:
            - "yc.milantiev.com:host-gateway"
        volumes:
            - ./e2e:/work/e2e
            - ./release.check:/work/release.check

    mercure:
        restart: always
        image: dunglas/mercure:v0.16
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://mercure:8080/.well-known/mercure?topic=health"]
            interval: 15s
            timeout: 5s
            retries: 5
        environment:
            SERVER_NAME: ':8080'
            MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY}
            MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY}
            MERCURE_EXTRA_DIRECTIVES: |
                cors_origins *
                anonymous 0
        ports:
            - 281:8080

    loki:
        image: grafana/loki:3.6
        restart: always
        command: -config.file=/etc/loki/loki-config.yaml
        volumes:
            - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
            - loki-data:/loki
        expose:
            - 3100
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
            interval: 30s
            timeout: 5s
            retries: 3

    promtail:
        image: grafana/promtail:3.6
        restart: always
        command: -config.file=/etc/promtail/promtail-config.yaml
        volumes:
            - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro 
        expose:
            - 9080
        depends_on:
            - loki

    grafana:
        image: grafana/grafana-oss:12.4.2
        depends_on:
            - postgres
            - loki
        ports:
            - "3000:3000"
        volumes:
            - ./grafana:/var/lib/grafana
            - ./grafana-provisioning:/etc/grafana/provisioning
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
            - GF_INSTALL_PLUGINS=grafana-piechart-panel
            - http_proxy=http://212.237.218.136:8888
            - https_proxy=http://212.237.218.136:8888
            - no_proxy=localhost,127.0.0.1,postgres,loki,nginx,prometheus
        restart: always

    prometheus:
        image: prom/prometheus:v3
        restart: always
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        expose:
            - 9090

networks:
    appnet:
        driver: bridge

volumes:
    uploads:
    db-data:
    loki-data:
    prometheus-data:
