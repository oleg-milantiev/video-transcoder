server {
    server_name yc.milantiev.com; # prod name
    listen 80;

    root /var/www/yc/public;

    set $maintenance 0;
    if (-f /var/www/yc/public/maintenance/enable) {
        set $maintenance 1;
    }
    if ($request_uri ~ ^/maintenance/index\.html$) {
        set $maintenance 0;
    }
    if ($maintenance = 1) {
        return 503;
    }
    error_page 503 @maintenance;
    location @maintenance {
        rewrite ^(.*)$ /maintenance/index.html break;
    }

    client_max_body_size 10M;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location /metrics/prometheus {
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;

        try_files $uri /index.php$is_args$args;
    }

    location /upload {
        fastcgi_request_buffering off;
        fastcgi_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;

        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    access_log /dev/stdout;
    error_log /dev/stderr warn;
}
