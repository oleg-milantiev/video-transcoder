services:
    nginx:
        restart: always
        image: olegmilantiev/yc-nginx:${PROJECT_VERSION}
#        ports:
#            - 80:80
        expose:
            - 80
            - 443
        depends_on:
            - php
        volumes:
            - uploads:/var/www/yc/public/uploads:ro

    php:
        restart: always
        image: olegmilantiev/yc-php:${PROJECT_VERSION}
        env_file:
            - .env
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        expose:
            - 9000
        volumes:
            - uploads:/var/www/yc/public/uploads

    ffmpeg:
        restart: always
        image: olegmilantiev/yc-ffmpeg:${PROJECT_VERSION}
        env_file:
            - .env
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        command: sh -c '/var/www/yc/bin/console messenger:consume async -vvv'
#        mem_limit: 256m
        deploy:
            replicas: 1
#            resources:
#                limits:
#                    memory: 256M
        volumes:
            - uploads:/var/www/yc/public/uploads

    ffmpeg-transcode:
        restart: always
        image: olegmilantiev/yc-ffmpeg:${PROJECT_VERSION}
        env_file:
            - .env
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        command: sh -c '/var/www/yc/bin/console messenger:consume async_transcode -vvv'
#        mem_limit: 512m
        deploy:
            # todo test with 2 replicas
            replicas: 1
            # todo limit memory. Ex.: 4k use 2g+ :(
#            resources:
#                limits:
#                    memory: 512M
        volumes:
            - uploads:/var/www/yc/public/uploads

    redis:
        restart: always
        image: redis:7
        expose:
            - 6379
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

    postgres:
        restart: always
        image: docker.io/postgres:16.2
        shm_size: 1g
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U yc"]
            interval: 5s
            timeout: 5s
            retries: 5
        expose:
            - 5432
        environment:
            - POSTGRES_USER=yc
            - POSTGRES_PASSWORD=yc

    playwright:
        image: mcr.microsoft.com/playwright:v1.53.0-jammy
        depends_on:
            - nginx
        working_dir: /work/e2e
        command: ["bash", "-lc", "sleep infinity"]
        volumes:
            - ./e2e:/work/e2e
            - ./release.check:/work/release.check

    mercure:
        restart: always
        image: dunglas/mercure:v0.16
        environment:
            SERVER_NAME: ':80'
            MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY}
            MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY}
            MERCURE_EXTRA_DIRECTIVES: |
                cors_origins *
                anonymous 0
        ports:
            - '8080:80'
        expose:
            - 80

networks:
    appnet:
        driver: bridge

volumes:
    uploads:
