services:
    nginx:
        restart: always
        image: olegmilantiev/yc-nginx:${PROJECT_VERSION}
        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - php
        volumes:
            - ./symfony:/var/www/yc
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    cron:
        restart: always
        image: olegmilantiev/yc-php:${PROJECT_VERSION}
        command: crond -f -l 2 -c /etc/crontabs
        env_file:
            - .env
        depends_on:
            - redis
            - postgres
        volumes:
            - ./symfony:/var/www/yc
            - ./crontabs:/etc/crontabs/root # alpine

    php:
        restart: always
        build:
            context: .
            dockerfile: ./docker/yc-php/Dockerfile
            target: dev
        env_file:
            - .env
        environment:
            - APP_ENV=dev
            - APP_DEBUG=1
        depends_on:
            - redis
            - postgres
        expose:
            - 9000
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./symfony:/var/www/yc
# use filesystem for debug
#            - symfony-var:/var/www/yc/var

    ffmpeg:
        restart: always
        image: olegmilantiev/yc-ffmpeg:${PROJECT_VERSION}
        env_file:
            - .env
        environment:
            - APP_ENV=dev
            - APP_DEBUG=1
        depends_on:
            - redis
            - postgres
        command: sh -c '/var/www/yc/bin/console messenger:consume async -vvv'
#        mem_limit: 256m
        deploy:
            replicas: 1
#            resources:
#                limits:
#                    memory: 256M
        volumes:
            - ./symfony:/var/www/yc
# use filesystem for debug
#            - symfony-var:/var/www/yc/var

    ffmpeg-transcode:
        restart: always
        image: olegmilantiev/yc-ffmpeg:${PROJECT_VERSION}
        env_file:
            - .env
        environment:
            - APP_ENV=dev
            - APP_DEBUG=1
        depends_on:
            - redis
            - postgres
        command: sh -c '/var/www/yc/bin/console messenger:consume async_transcode -vvv'
#        mem_limit: 256m
        deploy:
            replicas: 2
#            resources:
#                limits:
#                    memory: 256M
        volumes:
            - ./symfony:/var/www/yc

    redis:
        restart: always
        image: redis:7
        ports:
            - "6379:6379"
        expose:
            - 6379

    postgres:
        restart: always
        image: docker.io/postgres:16.2
        shm_size: 1g
        ports:
            - 5432:5432
        expose:
            - 5432
        environment:
            - POSTGRES_USER=yc
            - POSTGRES_PASSWORD=yc
        volumes:
            - ./postgresql:/host
            - db-data:/var/lib/postgresql/data

    mercure:
        restart: always
        image: dunglas/mercure:v0.16
        environment:
            SERVER_NAME: ':80'
            MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_PUBLISHER_JWT_KEY}
            MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_SUBSCRIBER_JWT_KEY}
            MERCURE_EXTRA_DIRECTIVES: |
                cors_origins *
                anonymous 0
        ports:
            - '8080:80'
        expose:
            - 80

volumes:
    # PostgreSQL data volume
    db-data:

    symfony-var:

networks:
    appnet:
        driver: bridge
